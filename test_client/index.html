                            <div class="post-stats">
                                <span>👀 ${post.view_count || 0}</span>
                                <span>👍 ${post.like_count || 0}</span>
                                <span>💬 ${post.comment_count || 0}</span>
                            </div>
                        </div>
                    `).join('')
                }
            `;
        }

        // 从用户主页快捷授予 VIP
        async function doSetVipFromProfile(userId) {
            if (!confirm('确定要授予该用户 VIP 吗？')) return;
            const res = await request(`/account/protected/vip/${userId}`, 'POST');
            if (res) {
                showToast('VIP 授予成功', 'success');
            }
        }

        // ===================== 我的主页 =====================
        async function loadMyProfile() {
            const card = document.getElementById('myProfileCard');
            card.innerHTML = '<div class="loading">加载中...</div>';

            const res = await request('/account/protected/profile', 'GET');
            if (!res || !res.data) {
                card.innerHTML = '<div class="loading">加载失败</div>';
                return;
            }

            const u = res.data;
            myRole = u.role || 0;
            myVip = !!u.vip;
            myProfileData = u;
            card.innerHTML = `
                <div class="profile-header">
                    <img src="${resolveAvatar(u.avatar)}">
                    <div class="info">
                        <h2>${escapeHtml(u.name)}
                            <span class="badge" style="background:${u.role === 1 ? '#ff9800' : '#2196f3'};color:white;">${u.role === 1 ? '管理员' : '用户'}</span>
                            ${u.vip ? '<span class="vip-badge">VIP</span>' : ''}
                            ${u.isMuted ? '<span class="badge" style="background:#f44336;color:white;">已禁言</span>' : ''}
                        </h2>
                        <p>账号: ${escapeHtml(u.account)}</p>
                        <p>${escapeHtml(u.introduction) || '这个人很懒，什么都没写'}</p>
                    </div>
                </div>
                <div style="margin: 12px 0; display: flex; gap: 8px;">
                    <button class="small ghost" onclick="navigateTo('settings')">✏️ 编辑资料</button>
                    <button class="small success" onclick="navigateTo('create-post')">✍️ 发帖</button>
                </div>
            `;

            // 默认显示帖子 tab
            myProfileTab = 'posts';
            document.getElementById('myTabPosts').classList.add('active');
            document.getElementById('myTabFollowing').classList.remove('active');
            document.getElementById('myTabFollowers').classList.remove('active');
            renderMyProfileTabContent();
        }

        function switchMyProfileTab(tab) {
            myProfileTab = tab;
            document.getElementById('myTabPosts').classList.toggle('active', tab === 'posts');
            document.getElementById('myTabFollowing').classList.toggle('active', tab === 'following');
            document.getElementById('myTabFollowers').classList.toggle('active', tab === 'followers');
            renderMyProfileTabContent();
        }

        async function renderMyProfileTabContent() {
            const container = document.getElementById('myProfileTabContent');

            if (myProfileTab === 'posts') {
                const u = myProfileData;
                if (!u || (u.posts || []).length === 0) {
                    container.innerHTML = '<p style="color: var(--text-secondary); padding: 16px 0;">暂无帖子，去发布一篇吧~</p>';
                } else {
                    container.innerHTML = (u.posts || []).map(post => `
                        <div class="post-item" onclick="navigateTo('post-detail', ${post.post_id})">
                            <div class="post-title">${escapeHtml(post.title)}</div>
                            <div class="post-stats">
                                <span>👀 ${post.view_count || 0}</span>
                                <span>👍 ${post.like_count || 0}</span>
                                <span>💬 ${post.comment_count || 0}</span>
                            </div>
                        </div>
                    `).join('');
                }
            } else if (myProfileTab === 'following') {
                container.innerHTML = '<div class="loading">加载中...</div>';
                const res = await request('/account/protected/following', 'GET');
                if (!res || !res.data || typeof res.data === 'string') {
                    container.innerHTML = '<p style="color: var(--text-secondary); padding: 16px 0;">还没有关注的人~</p>';
                } else {
                    container.innerHTML = renderFollowList(res.data);
                }
            } else if (myProfileTab === 'followers') {
                container.innerHTML = '<div class="loading">加载中...</div>';
                // 后端路由: GET /follow 获取我的粉丝列表
                const res = await request('/account/protected/follow', 'GET');
                if (!res || !res.data || typeof res.data === 'string') {
                    container.innerHTML = '<p style="color: var(--text-secondary); padding: 16px 0;">还没有粉丝~</p>';
                } else {
                    container.innerHTML = renderFollowList(res.data);
                }
            }
        }

        function renderFollowList(users) {
            return users.map(u => `
                <div class="follow-list-item">
                    <img src="${resolveAvatar(u.avatar)}" onclick="navigateTo('user-profile', ${u.user_id})">
                    <div class="follow-info">
                        <div class="follow-name" onclick="navigateTo('user-profile', ${u.user_id})">${escapeHtml(u.name)}</div>
                        <div class="follow-intro">${escapeHtml(u.introduction) || '这个人很懒，什么都没写'}</div>
                    </div>
                    <button class="small ghost" onclick="navigateTo('user-profile', ${u.user_id})">查看</button>
                </div>
            `).join('');
        }

        // ===================== 设置页 =====================
        function loadSettings() {
            // 管理员面板显示（注意 HTML 中用 style="display:none;" 而非 class）
            const adminPanel = document.getElementById('adminPanel');
            if (myRole === 1) {
                adminPanel.style.display = 'block';
            } else {
                adminPanel.style.display = 'none';
            }
        }

        async function doChangeName() {
            const name = document.getElementById('newName').value.trim();
            if (!name) return showToast('昵称不能为空', 'error');
            const res = await request('/account/protected/username', 'PATCH', { name });
            if (res) { showToast('昵称修改成功', 'success'); document.getElementById('newName').value = ''; }
        }

        async function doChangeIntro() {
            const introduction = document.getElementById('newIntro').value.trim();
            if (!introduction) return showToast('签名不能为空', 'error');
            const res = await request('/account/protected/introduction', 'PATCH', { introduction });
            if (res) { showToast('签名修改成功', 'success'); document.getElementById('newIntro').value = ''; }
        }

        async function doChangeAvatar() {
            const fileInput = document.getElementById('newAvatarFile');
            if (fileInput.files.length === 0) return showToast('请选择图片', 'error');
            const formData = new FormData();
            formData.append('avatar', fileInput.files[0]);
            const res = await request('/account/protected/avatar', 'POST', formData);
            if (res) { showToast('头像修改成功', 'success'); }
        }

        async function doChangePassword() {
            const pw1 = document.getElementById('newPass1').value;
            const pw2 = document.getElementById('newPass2').value;
            if (!pw1 || !pw2) return showToast('请输入密码', 'error');
            if (pw1 !== pw2) return showToast('两次密码不一致', 'error');
            const res = await request('/account/protected/password-change', 'POST', {
                first_password: pw1,
                second_password: pw2
            });
            if (res) {
                showToast('密码修改成功', 'success');
                document.getElementById('newPass1').value = '';
                document.getElementById('newPass2').value = '';
            }
        }

        async function doDeleteUser() {
            if (!confirm('确定要注销账号吗？此操作不可恢复！')) return;
            const res = await request('/account/protected/delete-user', 'DELETE');
            if (res) {
                showToast('账号已注销', 'success');
                localStorage.removeItem('token');
                myRole = 0;
                updateNavbar();
                navigateTo('auth');
            }
        }

        // ===================== 禁言 =====================
        async function doMute(isMuted) {
            const userId = document.getElementById('muteUserId').value.trim();
            if (!userId) return showToast('请输入用户ID', 'error');
            const res = await request(`/account/protected/muted/${userId}`, 'POST', { is_muted: isMuted });
            if (res) {
                showToast(isMuted ? '已禁言' : '已解禁', 'success');
            }
        }

        async function doMuteFromProfile(userId, isMuted) {
            const action = isMuted ? '禁言' : '解禁';
            if (!confirm(`确定要${action}该用户吗？`)) return;
            const res = await request(`/account/protected/muted/${userId}`, 'POST', { is_muted: isMuted });
            if (res) {
                showToast(`已${action}`, 'success');
                loadUserProfile(); // 刷新当前用户主页
            }
        }

        // ===================== VIP 设置（管理员）=====================
        async function doSetVip() {
            const userId = document.getElementById('vipUserId').value.trim();
            if (!userId) return showToast('请输入用户ID', 'error');
            // 路由: POST /account/protected/vip/:Id
            const res = await request(`/account/protected/vip/${userId}`, 'POST');
            if (res) {
                showToast('VIP 授予成功', 'success');
                document.getElementById('vipUserId').value = '';
            }
        }

        // ===================== 付费帖子设置（管理员）=====================
        async function doSetPaidPost() {
            const postId = document.getElementById('paidPostId').value.trim();
            if (!postId) return showToast('请输入帖子ID', 'error');
            // 路由: POST /account/protected/paid-post/:postId
            const res = await request(`/account/protected/paid-post/${postId}`, 'POST');
            if (res) {
                showToast('已设为付费帖子', 'success');
                document.getElementById('paidPostId').value = '';
            }
        }

        // 从帖子详情页直接设置付费（管理员快捷操作）
        async function doSetPaidPostFromDetail(postId) {
            if (!confirm(`确定将此帖子设为付费内容吗？`)) return;
            const res = await request(`/account/protected/paid-post/${postId}`, 'POST');
            if (res) {
                showToast('已设为付费帖子', 'success');
                loadPostDetail(); // 刷新
            }
        }

        // ===================== WS & 微信风格聊天 =====================
        let ws;
        let currentChatUserId = null;   // 当前正在聊天的用户ID
        let contactMap = {};            // { userId: {id, name, avatar, lastMsg, lastTime, unread} }
        let myUserId = null;            // 自己的用户ID（从token解析）
        let myAvatar = '';
        let myName = '';

        // 解析 JWT 获取自己的 userId
        function parseJwtPayload(token) {
            try {
                const payload = token.split('.')[1];
                return JSON.parse(atob(payload));
            } catch(e) { return {}; }
        }

        function getMyUserId() {
            const token = getToken();
            if (!token) return null;
            const p = parseJwtPayload(token);
            return p.userId || null;
        }

        // WS连接
        function connectWs() {
            if (ws && ws.readyState === WebSocket.OPEN) return;
            if (ws && ws.readyState === WebSocket.CONNECTING) return;
            const token = getToken();
            if(!token) return;
            myUserId = getMyUserId();
            const url = `ws://${new URL(getBaseUrl()).host}/account/protected/websocket?token=${token}`;
            ws = new WebSocket(url);
            ws.onopen = () => {
                updateWsStatus(true);
            };
            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                if (msg.code === 1) { // 聊天消息
                    handleIncomingChat(msg.data);
                } else if (msg.code === 2) { // 通知
                    showToast(`🔔 ${msg.data.content}`);
                }
            };
            ws.onclose = () => {
                updateWsStatus(false);
                ws = null;
                setTimeout(connectWs, 5000);
            };
            ws.onerror = () => {
                updateWsStatus(false);
            };
        }

        function updateWsStatus(online) {
            const dot = document.getElementById('wsDot');
            const status = document.getElementById('chatStatus');
            if (dot) {
                dot.classList.toggle('online', online);
                dot.classList.toggle('offline', !online);
            }
            if (status) status.textContent = online ? '已连接' : '未连接';
        }

        // 处理收到的聊天消息
        function handleIncomingChat(data) {
            const isMine = data.is_mine;
            const peerId = isMine ? data.to_id : data.from_id;

            // 更新联系人最后一条消息
            if (contactMap[peerId]) {
                contactMap[peerId].lastMsg = data.content;
                contactMap[peerId].lastTime = data.created_at || new Date().toLocaleTimeString();
            }

            // 如果当前正在跟这个人聊天
            if (currentChatUserId === peerId) {
                appendMsg(data);
            } else if (!isMine) {
                // 不是当前聊天窗口 → 增加未读计数
                if (contactMap[peerId]) {
                    contactMap[peerId].unread = (contactMap[peerId].unread || 0) + 1;
                } else {
                    // 陌生人发来消息，临时加到联系人
                    contactMap[peerId] = {
                        id: peerId, name: `用户${peerId}`, avatar: '',
                        lastMsg: data.content,
                        lastTime: data.created_at || new Date().toLocaleTimeString(),
                        unread: 1
                    };
                }
                showToast(`💬 收到新消息: ${data.content}`);
            }
            renderContactList();
        }

        // 切换消息Tab
        function switchMessageTab(t) {
            document.getElementById('noticeList').classList.toggle('hidden', t!=='notices');
            document.getElementById('chatInterface').classList.toggle('hidden', t!=='chat');
            document.getElementById('tabNotices').classList.toggle('active', t==='notices');
            document.getElementById('tabChat').classList.toggle('active', t==='chat');
            if(t==='notices') loadNotices();
            if(t==='chat') { connectWs(); loadContacts(); }
        }

        async function loadNotices() {
            const el = document.getElementById('noticeList');
            const res = await request('/account/protected/notices', 'GET');
            if(!res || !res.data || res.data.length === 0) {
                el.innerHTML='<div style="padding:30px;text-align:center;color:#999;">暂无通知</div>';
                return;
            }
            el.innerHTML = res.data.map(n=>`
                <div style="padding:12px 16px;border-bottom:1px solid #f0f0f0;font-size:14px;line-height:1.6;">
                    <span style="color:#999;font-size:12px;">${n.created_at || ''}</span><br>
                    ${escapeHtml(n.content)}
                </div>
            `).join('');
        }

        // 加载联系人（关注列表 + 粉丝列表合并去重）
        async function loadContacts() {
            // 获取自己的信息
            const profileRes = await request('/account/protected/profile', 'GET');
            if (profileRes && profileRes.data) {
                myAvatar = profileRes.data.avatar || '';
                myName = profileRes.data.name || '';
            }
            myUserId = getMyUserId();

            // 同时拉取关注列表和粉丝列表
            const [followingRes, followerRes] = await Promise.all([
                request('/account/protected/following', 'GET'),
                request('/account/protected/follow', 'GET')
            ]);

            // 合并联系人，去重
            const merge = (list) => {
                if (!list || typeof list === 'string' || !Array.isArray(list)) return;
                list.forEach(u => {
                    if (!contactMap[u.user_id]) {
                        contactMap[u.user_id] = {
                            id: u.user_id,
                            name: u.name,
                            avatar: u.avatar,
                            lastMsg: '',
                            lastTime: '',
                            unread: 0
                        };
                    } else {
                        // 更新名字和头像
                        contactMap[u.user_id].name = u.name;
                        contactMap[u.user_id].avatar = u.avatar;
                    }
                });
            };
            if (followingRes && followingRes.data) merge(followingRes.data);
            if (followerRes && followerRes.data) merge(followerRes.data);

            renderContactList();
        }

        // 渲染联系人列表
        function renderContactList() {
            const el = document.getElementById('contactList');
            const searchVal = (document.getElementById('contactSearch')?.value || '').trim().toLowerCase();
            let contacts = Object.values(contactMap);

            // 搜索过滤
            if (searchVal) {
                contacts = contacts.filter(c =>
                    c.name.toLowerCase().includes(searchVal) ||
                    String(c.id).includes(searchVal)
                );
            }

            // 排序：有未读的排前面，其次按最后消息时间
            contacts.sort((a, b) => {
                if ((b.unread || 0) !== (a.unread || 0)) return (b.unread || 0) - (a.unread || 0);
                if (b.lastTime && !a.lastTime) return 1;
                if (a.lastTime && !b.lastTime) return -1;
                return 0;
            });

            if (contacts.length === 0) {
                el.innerHTML = '<div style="padding:30px;text-align:center;color:#999;font-size:13px;">暂无联系人<br>在下方输入ID添加</div>';
                return;
            }

            el.innerHTML = contacts.map(c => `
                <div class="contact-item ${currentChatUserId === c.id ? 'active' : ''}" onclick="selectContact(${c.id})">
                    <img src="${resolveAvatar(c.avatar)}" alt="">
                    <div class="contact-info">
                        <div class="contact-name">${escapeHtml(c.name)}</div>
                        <div class="contact-last-msg">${escapeHtml(c.lastMsg || '')}</div>
                    </div>
                    ${c.lastTime ? `<span class="contact-time">${c.lastTime.slice(-8, -3) || ''}</span>` : ''}
                    ${c.unread ? `<span class="unread-badge">${c.unread > 99 ? '99+' : c.unread}</span>` : ''}
                </div>
            `).join('');
        }

        function filterContacts() {
            renderContactList();
        }

        // 通过ID添加临时联系人
        async function addContactById() {
            const idInput = document.getElementById('chatTargetId');
            const uid = parseInt(idInput.value);
            if (!uid || uid === myUserId) {
                showToast('请输入有效的用户ID', 'error');
                return;
            }
            // 检查是否已存在
            if (contactMap[uid]) {
                selectContact(uid);
                idInput.value = '';
                return;
            }
            // 尝试获取该用户信息
            const res = await request(`/account/protected/users/${uid}`, 'GET');
            if (res && res.data) {
                contactMap[uid] = {
                    id: uid,
                    name: res.data.name || `用户${uid}`,
                    avatar: res.data.avatar || '',
                    lastMsg: '',
                    lastTime: '',
                    unread: 0
                };
                renderContactList();
                selectContact(uid);
                idInput.value = '';
            } else {
                showToast('用户不存在', 'error');
            }
        }

        // 选中联系人，加载聊天记录
        async function selectContact(userId) {
            currentChatUserId = userId;
            const contact = contactMap[userId];
            if (!contact) return;

            // 清除未读
            contact.unread = 0;
            renderContactList();

            // 显示聊天区域
            document.getElementById('chatEmpty').style.display = 'none';
            document.getElementById('chatRightHeader').style.display = 'block';
            document.getElementById('chatHistory').style.display = 'flex';
            document.getElementById('chatInputArea').style.display = 'block';

            // 设置标题
            document.getElementById('chatRightHeader').textContent = contact.name;

            // 加载历史消息
            const el = document.getElementById('chatHistory');
            el.innerHTML = '<div style="text-align:center;color:#999;font-size:12px;padding:20px;">加载中...</div>';

            const res = await request(`/account/protected/messages/${userId}`, 'GET');
            el.innerHTML = '';

            if (res && res.data && res.data.length > 0) {
                // 消息是倒序的，需要 reverse
                const msgs = [...res.data].reverse();
                msgs.forEach(m => {
                    const isMine = m.from_user_id !== userId;
                    appendMsg({
                        is_mine: isMine,
                        content: m.content,
                        from_id: m.from_user_id,
                        to_id: m.to_user_id,
                        created_at: '',
                        from_avatar: isMine ? myAvatar : (contact.avatar || ''),
                        to_avatar: isMine ? (contact.avatar || '') : myAvatar
                    });
                });
            } else {
                el.innerHTML = '<div style="text-align:center;color:#b0b0b0;font-size:13px;padding:40px;">暂无聊天记录，发条消息开始吧 👋</div>';
            }

            // 聚焦输入框
            document.getElementById('chatInput').focus();
        }

        // 发送消息
        function doSendChat() {
            if (!currentChatUserId) return;
            const textarea = document.getElementById('chatInput');
            const txt = textarea.value.trim();
            if (!txt) return;
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                showToast('WebSocket 未连接，请稍候重试', 'error');
                return;
            }
            ws.send(JSON.stringify({ to_user_id: currentChatUserId, content: txt, type: 1 }));
            textarea.value = '';
            textarea.focus();
        }

        // 渲染一条消息
        function appendMsg(d) {
            const el = document.getElementById('chatHistory');
            // 如果之前是"暂无聊天记录"提示，先清掉
            if (el.querySelector('div[style*="暂无聊天记录"]') || el.textContent.includes('暂无聊天记录')) {
                if (!el.querySelector('.msg-row')) el.innerHTML = '';
            }

            const isMine = d.is_mine;
            const contact = contactMap[currentChatUserId] || {};
            const avatar = isMine ? myAvatar : (d.from_avatar || contact.avatar || '');
            const text = escapeHtml(d.content);

            const row = document.createElement('div');
            row.className = `msg-row ${isMine ? 'mine' : 'other'}`;
            row.innerHTML = `
                <img class="msg-avatar" src="${resolveAvatar(avatar)}" onclick="${isMine ? '' : `navigateTo('user-profile', ${d.from_id || currentChatUserId})`}">
                <div class="msg-bubble">${text}</div>
            `;
            el.appendChild(row);
            el.scrollTop = el.scrollHeight;
        }

        if (isLoggedIn()) connectWs();

        // ===================== 初始化 =====================
        updateNavbar();
        if (isLoggedIn()) {
            navigateTo('feed');
        } else {
            navigateTo('feed');
        }

        // 键盘快捷键：Enter 登录
        document.getElementById('loginPassword').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
        document.getElementById('regPassword').addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });

        // textarea 内容变化时实时更新图片预览
        document.getElementById('postContent').addEventListener('input', () => renderImagePreviewFromText('post'));
        document.getElementById('commentContent').addEventListener('input', () => renderImagePreviewFromText('comment'));
    </script>
